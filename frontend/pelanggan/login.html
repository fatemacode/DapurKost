<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - DapurKost</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

:root{
    --cream:#FEF9E1;
    --beige:#E5D0AC;
    --red:#A31D1D;
    --darkred:#6D2323;
}

body{
    background:var(--cream);
    font-family:'Segoe UI',sans-serif;
}

/* NAVBAR */

.navbar{
    min-height:80px;
}

.navbar-brand{
    color:var(--darkred);
    font-weight:700;
}

/* LOGIN */

.login-section{
    min-height:90vh;
    display:flex;
    align-items:center;
}

.login-card{
    border:none;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,.1);
}

/* LEFT */

.login-left{
    background:linear-gradient(
        135deg,
        var(--red),
        var(--darkred)
    );

    color:white;
    padding:60px;
    height:100%;
}

.login-left h2{
    font-weight:700;
}

.login-left img{
    width:100%;
    margin-top:30px;
    border-radius:20px;
}

/* RIGHT */

.login-right{
    background:white;
    padding:50px;
}

.login-title{
    color:var(--darkred);
    font-weight:700;
}

.form-control{
    height:55px;
    border-radius:15px;
}

.btn-login{
    background:var(--red);
    color:white;
    border:none;
    border-radius:15px;
    height:55px;
    font-weight:600;
}

.btn-login:hover{
    background:var(--darkred);
    color:white;
}

.register-link{
    color:var(--red);
    text-decoration:none;
    font-weight:600;
}

.divider{
    text-align:center;
    margin:20px 0;
    color:#999;
}

/* RESPONSIVE */

@media(max-width:991px){

.login-section{
padding:40px 0;
}

.login-right{
padding:30px;
}

.login-title{
font-size:28px;
}

}

@media(max-width:576px){

.login-right{
padding:25px;
}

.login-title{
font-size:24px;
}

.form-control{
height:50px;
}

.btn-login{
height:50px;
}

.navbar{
min-height:70px;
}

.navbar-brand{
font-size:20px;
}

}

</style>
</head>
<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg bg-white shadow-sm">

<div class="container">

<a class="navbar-brand" href="home.html">
🍲 DapurKost
</a>

<a href="paket.html"
class="btn btn-outline-danger rounded-pill px-4">
← Kembali
</a>

</div>

</nav>

<!-- LOGIN -->

<section class="login-section">

<div class="container">

<div class="card login-card">

<div class="row g-0">

<!-- LEFT -->

<div class="col-lg-6 d-none d-lg-block">

<div class="login-left">

<h2>
Makan Enak,<br>
Anti Boros
</h2>

<p class="mt-3">
Masuk untuk melanjutkan pemesanan paket langganan favoritmu.
</p>

<img
src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=900"
alt="Food">

</div>

</div>

<!-- RIGHT -->

<div class="col-lg-6">

<div class="login-right">

<h2 class="login-title">
Selamat Datang 👋
</h2>

<p class="text-muted mb-4">
Silakan login untuk melanjutkan pesanan.
</p>

<form action="checkout.html">

<div class="mb-3">

<label>Email</label>

<input
type="email"
class="form-control"
placeholder="Masukkan email">

</div>

<div class="mb-3">

<label>Password</label>

<div class="input-group">

<input
type="password"
class="form-control"
id="password"
placeholder="Masukkan password">

<button
type="button"
class="btn btn-outline-secondary"
onclick="togglePassword()">

<i class="bi bi-eye"></i>

</button>

</div>

</div>

<div class="text-end mb-3">

<a href="#" class="register-link">
Lupa Password?
</a>

</div>

<button
type="submit"
class="btn btn-login w-100">

Masuk

</button>

</form>

<div class="divider">
atau
</div>

<a href="checkout.html"
class="btn btn-outline-secondary w-100">
<i class="bi bi-google"></i>
 Masuk dengan Google
</a>

</button>

<p class="text-center mt-4">

Belum punya akun?

<a href="register.html"
class="register-link">

Daftar Sekarang

</a>

</p>

</div>

</div>

</div>

</div>

</div>

</section>

<script>

function togglePassword(){

const password =
document.getElementById("password");

if(password.type === "password"){
    password.type = "text";
}else{
    password.type = "password";
}

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
