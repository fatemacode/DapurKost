<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout - DapurKost</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

:root{
    --cream:#FEF9E1;
    --beige:#E5D0AC;
    --red:#A31D1D;
    --darkred:#6D2323;
}

body{
    background:var(--cream);
    font-family:'Segoe UI',sans-serif;
}

/* NAVBAR */

.navbar{
    min-height:80px;
}

.navbar-brand{
    color:var(--darkred);
    font-weight:700;
}

/* HEADER */

.checkout-header{
    background:linear-gradient(
        135deg,
        var(--red),
        var(--darkred)
    );
    color:white;
    padding:60px 0;
}

/* CARD */

.checkout-card,
.summary-card{
    border:none;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

/* FORM */

.form-control,
.form-select{
    border-radius:15px;
    min-height:55px;
}

/* SUMMARY */

.price{
    color:var(--red);
    font-weight:700;
}

.total{
    color:var(--red);
    font-size:28px;
    font-weight:700;
}

/* BUTTON */

.btn-pay{
    background:var(--red);
    color:white;
    border:none;
    border-radius:15px;
    height:55px;
    font-weight:600;
}

.btn-pay:hover{
    background:var(--darkred);
    color:white;
}

.order-item{
    border-bottom:1px solid #eee;
    padding:12px 0;
}

/* RESPONSIVE */

@media(max-width:991px){

.checkout-header{
padding:50px 20px;
}

.checkout-header h1{
font-size:32px;
}

}

@media(max-width:576px){

.navbar{
min-height:70px;
}

.checkout-header{
padding:40px 15px;
}

.checkout-header h1{
font-size:28px;
}

.checkout-card,
.summary-card{
border-radius:20px;
}

.form-control,
.form-select{
min-height:50px;
}

.total{
font-size:24px;
}

.btn-pay{
height:50px;
}

}

</style>
</head>
<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg bg-white shadow-sm">

<div class="container">

<a class="navbar-brand" href="home.html">
🍲 DapurKost
</a>

<a href="login.html"
class="btn btn-outline-danger rounded-pill">
<i class="bi bi-arrow-left"></i>
 Kembali
</a>

</div>

</nav>

<!-- HEADER -->

<section class="checkout-header">

<div class="container text-center">

<h1>Checkout Pesanan</h1>

<p>
Lengkapi data pengiriman untuk menyelesaikan pesananmu.
</p>

</div>

</section>

<div class="container py-5">

<div class="row g-4">

<!-- FORM -->

<div class="col-lg-7">

<div class="card checkout-card p-4">

<h4 class="mb-4" style="color:#6D2323;">
<i class="bi bi-geo-alt-fill"></i>
 Data Pengiriman
</h4>

<form>

<div class="mb-3">

<label>Nama Penerima</label>

<input
type="text"
class="form-control"
value="Restu Nevia"
readonly>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Nomor Telepon</label>

<input
type="tel"
class="form-control"
value="081234567890"
readonly>

</div>

<div class="col-md-6 mb-3">

<label>Tanggal Mulai</label>

<input
type="date"
class="form-control">

</div>

</div>

<div class="mb-3">

<label>Alamat Kost</label>

<textarea
class="form-control"
rows="3"
readonly>
Condongcatur
</textarea>

</div>

<div class="mb-3">

<label>Catatan Pesanan</label>

<textarea
class="form-control"
rows="3"
placeholder="Contoh: jangan pedas">
</textarea>

</div>

</form>

</div>

</div>

<!-- SUMMARY -->

<div class="col-lg-5">

<div class="card summary-card p-4">

<h4 class="mb-4" style="color:#6D2323;">
🛒 Ringkasan Pesanan
</h4>

<div class="order-item d-flex justify-content-between">
<span>Nasi Ayam Geprek</span>
<span>Rp15.000</span>
</div>

<div class="order-item d-flex justify-content-between">
<span>Es Teh Manis</span>
<span>Rp5.000</span>
</div>

<div class="order-item d-flex justify-content-between">
<span>Paket Mingguan</span>
<span>Rp150.000</span>
</div>

<div class="order-item d-flex justify-content-between">
<span>Biaya Pengiriman</span>
<span>Gratis</span>
</div>

<hr>

<div class="d-flex justify-content-between">

<h5>Total</h5>

<div class="total">
Rp170.000
</div>

</div>

<a href="pembayaran.html"
class="btn btn-pay w-100 mt-4">

Lanjut ke Pembayaran →

</a>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
