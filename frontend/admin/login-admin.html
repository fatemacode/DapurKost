<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Admin - DapurKost</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

:root{
    --cream:#FEF9E1;
    --beige:#E5D0AC;
    --red:#A31D1D;
    --darkred:#6D2323;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg, var(--darkred), var(--red));
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    font-family:'Segoe UI',sans-serif;
}

.login-card{
    width:100%;
    max-width:460px;
    background:white;
    border-radius:30px;
    padding:40px;
    box-shadow:0 20px 50px rgba(0,0,0,.15);
}

.logo{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg, var(--red), var(--darkred));
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    margin-bottom:20px;
}

.title{
    color:var(--darkred);
    font-weight:700;
}

.subtitle{
    color:#777;
}

.form-control{
    height:55px;
    border-radius:15px;
}

.input-group-text{
    border-radius:15px 0 0 15px;
}

.btn-login{
    height:55px;
    border:none;
    border-radius:15px;
    background:var(--red);
    color:white;
    font-weight:600;
    transition:.3s;
}

.btn-login:hover{
    background:var(--darkred);
}

.admin-badge{
    display:inline-block;
    background:#fff3cd;
    color:#856404;
    padding:8px 15px;
    border-radius:50px;
    font-size:13px;
    margin-bottom:20px;
}

</style>
</head>

<body>

<div class="login-card">

    <div class="text-center">

        <div class="logo">
            <i class="bi bi-shield-lock-fill"></i>
        </div>

        <div class="admin-badge">
            Admin Area
        </div>

        <h2 class="title">Login Admin</h2>

        <p class="subtitle">
            Masuk untuk mengelola sistem DapurKost
        </p>

    </div>

    <!-- FORM LOGIN -->
    <form id="loginForm">

        <!-- EMAIL -->
        <div class="mb-3">

            <label class="form-label">Email Admin</label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="bi bi-envelope"></i>
                </span>

                <input type="email"
                       class="form-control"
                       id="email"
                       placeholder="admin@dapurkost.com"
                       required>

            </div>

        </div>

        <!-- PASSWORD -->
        <div class="mb-3">

            <label class="form-label">Password</label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                </span>

                <input type="password"
                       class="form-control"
                       id="password"
                       placeholder="Masukkan password"
                       required>

                <button class="btn btn-outline-secondary"
                        type="button"
                        onclick="togglePassword()">

                    <i class="bi bi-eye" id="eyeIcon"></i>

                </button>

            </div>

        </div>

        <!-- BUTTON LOGIN -->
        <div class="d-grid mt-4">

            <button class="btn-login" type="submit">
                <i class="bi bi-box-arrow-in-right"></i>
                Login Admin
            </button>

        </div>

    </form>

    <hr class="my-4">

    <div class="text-center text-muted">
        <small>© 2026 DapurKost Admin Panel</small>
    </div>

</div>

<!-- SCRIPT -->
<script>

// toggle show/hide password
function togglePassword(){

    const password = document.getElementById("password");
    const eyeIcon = document.getElementById("eyeIcon");

    if(password.type === "password"){
        password.type = "text";
        eyeIcon.classList.remove("bi-eye");
        eyeIcon.classList.add("bi-eye-slash");
    }else{
        password.type = "password";
        eyeIcon.classList.remove("bi-eye-slash");
        eyeIcon.classList.add("bi-eye");
    }

}

// LOGIN VALIDASI + REDIRECT
document.getElementById("loginForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    // LOGIN VALID
    if(email === "admin@dapurkost.com" && password === "1234"){

        // masuk dashboard
        window.location.href = "dashboard-admin.html";

    } else {

        alert("Email atau password salah!");

    }

});

</script>

</body>
</html>
